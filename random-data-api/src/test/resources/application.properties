quarkus.http.port=8080

# JSON-B
quarkus.jsonb.date-format=yyyy-MM-dd

# OpenAPI
quarkus.smallrye-openapi.path=/openapi
quarkus.smallrye-openapi.schema-generation.enabled=true


ratelimiter.capacity=150
ratelimiter.refillPeriodMinutes=1

# switch Quarkus? worker pool to use Java-Loom virtual threads
quarkus.thread-pool.worker-pool-type=virtual